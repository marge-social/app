<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="marge">
  <!-- Marque réduite (favicon) : le point — seule étincelle d'accent de la marque
       (lie-de-vin #7c3a4b = --accent) — sur fond blanc (#ffffff = --bg). Le mot
       complet « marge. » devient illisible sous 16px ; on n'en garde que le point. -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>
  <circle cx="16" cy="16" r="6.5" fill="#7c3a4b"/>
</svg>
