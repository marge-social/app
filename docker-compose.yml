# Déploiement VPS : app Next.js (+ worker de livraison fédérée in-process),
# Postgres, migrations one-shot, Caddy (HTTPS auto), cron RSS.
# Variables dans .env (voir .env.production.example).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: marge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marge -d marge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Migrations Drizzle, jouées une fois avant le démarrage de l'app.
  migrate:
    build:
      context: .
      target: runner
    command: ["node", "scripts/migrate.mjs"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      APP_URL: ${APP_URL}
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      KEY_ENCRYPTION_SECRET: ${KEY_ENCRYPTION_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      # Stockage objet OVH (S3) + origine média publique (cahier médias).
      MEDIA_BASE_URL: ${MEDIA_BASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      # Email transactionnel (activation d'inscription, cf. ADR 0006).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      # Mesure d'audience Matomo (RGPD sans bandeau). Vides = aucun suivi.
      MATOMO_URL: ${MATOMO_URL:-}
      MATOMO_SITE_ID: ${MATOMO_SITE_ID:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      # Sous-domaine média + hôte du bucket S3 (reverse-proxy, cahier médias §2).
      MEDIA_DOMAIN: ${MEDIA_DOMAIN}
      MEDIA_BUCKET_HOST: ${MEDIA_BUCKET_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # Tâches périodiques via les endpoints protégés : polling RSS toutes les
  # 15 min, et maintenance des inscriptions non activées (rappel 48 h /
  # suppression 96 h — idempotente, cf. ADR 0006) une fois par heure.
  cron:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      - app
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl >/dev/null
        i=0
        while true; do
          sleep 900
          curl -fsS -H "Authorization: Bearer $$CRON_SECRET" \
            http://app:3000/api/cron/poll >/dev/null || true
          i=$$((i + 1))
          if [ $$((i % 4)) -eq 0 ]; then
            curl -fsS -H "Authorization: Bearer $$CRON_SECRET" \
              http://app:3000/api/cron/signups >/dev/null || true
          fi
        done

volumes:
  pgdata:
  caddy_data:
  caddy_config:
